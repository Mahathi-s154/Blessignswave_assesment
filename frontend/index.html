<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blessings Wave Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Blessings Wave Store</h1>
      <p>Simple products, clear prices, and helpful shopping support.</p>
    </div>
  </header>

  <main>
    <section class="section-heading">
      <h2>All Products</h2>
      <p>Browse our current product list.</p>
    </section>

    <section id="product-grid" class="product-grid" aria-live="polite"></section>
  </main>

  <div class="chat-widget" aria-label="AI customer support chat">
    <section id="chat-window" class="chat-window" hidden>
      <div class="chat-header">
        <h2>ShopMate AI Assistant</h2>
        <button id="chat-close" class="chat-close" type="button" aria-label="Close chat">×</button>
      </div>
      <div id="chat-messages" class="chat-messages" aria-live="polite">
        <div class="message bot">Hi! Ask me about products, shipping, returns, or payments.</div>
      </div>
      <form id="chat-form" class="chat-input-area">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask a question..." autocomplete="off" required>
        <button class="chat-send-btn" type="submit">Send</button>
      </form>
    </section>
    <button id="chat-toggle" class="chat-toggle" type="button" aria-controls="chat-window" aria-expanded="false">AI</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
