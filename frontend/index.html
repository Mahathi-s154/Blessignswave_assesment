<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blessings Wave Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Blessings Wave Store</h1>
      <p>Simple products, clear prices, and helpful shopping support.</p>
    </div>
  </header>

  <main>
    <section class="section-heading">
      <h2>All Products</h2>
      <p>Browse our current product list.</p>
    </section>

    <section id="product-grid" class="product-grid" aria-live="polite"></section>
  </main>

  <section class="chat-widget" aria-label="Store assistant chat">
    <div class="chat-header">
      <h2>Store Assistant</h2>
    </div>
    <div id="chat-messages" class="chat-messages" aria-live="polite">
      <div class="message bot-message">Ask about products, prices, stock, shipping, returns, or payment options.</div>
    </div>
    <form id="chat-form" class="chat-form">
      <input id="chat-input" type="text" placeholder="Ask a question..." autocomplete="off" required>
      <button type="submit">Send</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
