<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | ShopMate AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">ShopMate AI</a>
    <div class="nav-links">
      <a href="index.html#products">Products</a>
      <button id="nav-ask-ai" class="nav-button" type="button">Ask AI</button>
    </div>
  </nav>

  <main>
    <a class="back-link" href="index.html">← Back to all products</a>
    <section id="product-detail" class="product-detail" aria-live="polite">
      <p class="status-message">Loading product...</p>
    </section>
  </main>

  <div class="chat-widget" aria-label="AI customer support chat">
    <section id="chat-window" class="chat-window" hidden>
      <div class="chat-header">
        <h2>ShopMate AI Assistant</h2>
        <button id="chat-close" class="chat-close" type="button" aria-label="Close chat">×</button>
      </div>
      <div id="chat-messages" class="chat-messages" aria-live="polite">
        <div class="message bot">Hi! I can help with products, prices, stock, shipping, returns, and payments.</div>
      </div>
      <form id="chat-form" class="chat-input-area">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask a question..." autocomplete="off" required>
        <button class="chat-send-btn" type="submit">Send</button>
      </form>
    </section>
    <button id="chat-toggle" class="chat-toggle" type="button" aria-controls="chat-window" aria-expanded="false">AI</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
