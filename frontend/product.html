<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Product Details</h1>
      <p><a class="header-link" href="index.html">Back to all products</a></p>
    </div>
  </header>

  <main>
    <section id="product-detail" class="product-detail" aria-live="polite">
      <p class="status-message">Loading product...</p>
    </section>
  </main>

  <section class="chat-widget" aria-label="Store assistant chat">
    <div class="chat-header">
      <h2>Store Assistant</h2>
    </div>
    <div id="chat-messages" class="chat-messages" aria-live="polite">
      <div class="message bot-message">Ask about products, prices, stock, shipping, returns, or payment options.</div>
    </div>
    <form id="chat-form" class="chat-form">
      <input id="chat-input" type="text" placeholder="Ask a question..." autocomplete="off" required>
      <button type="submit">Send</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
